name: Daily job digest

# Runs the agent on a schedule and emails you a digest of new matches.
# Requires configuration (see docs/SETUP.md → "Scheduled daily digest"):
#   secrets.RESUME_JSON  – your profile as JSON (kept private as a secret)
#   secrets.SMTP_HOST / SMTP_USERNAME / SMTP_PASSWORD  – outbound mail
#   secrets.DIGEST_TO    – where to send the digest
# Without the SMTP secrets the digest is still produced and uploaded as a
# workflow artifact (no email is sent).

on:
  schedule:
    - cron: "0 21 * * *"   # 21:00 UTC daily (~07:00 Melbourne AEST)
  workflow_dispatch: {}     # allow manual runs

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import profile
        env:
          RESUME_JSON: ${{ secrets.RESUME_JSON }}
        run: |
          python -m job_agent.cli init
          if [ -n "$RESUME_JSON" ]; then
            printf '%s' "$RESUME_JSON" > profile.json
            python -m job_agent.cli import-resume profile.json
            rm -f profile.json
          else
            echo "No RESUME_JSON secret set; importing the bundled example profile."
            python -m job_agent.cli import-resume examples/sample_profile.json
          fi

      - name: Build & send digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
        run: python -m job_agent.cli digest --top 5 --out digest.md

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: job-digest
          path: digest.md
          if-no-files-found: warn
