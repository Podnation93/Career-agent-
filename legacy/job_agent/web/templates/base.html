<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AI Job Agent{% endblock %}</title>
  <style>
    :root { --bg:#0f1216; --card:#181d24; --ink:#e7edf3; --muted:#9aa7b3;
            --accent:#4f9cff; --good:#36c275; --warn:#e0a23b; --bad:#e0594b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background:var(--bg); color:var(--ink); }
    header { padding:18px 28px; border-bottom:1px solid #232a33; display:flex;
             align-items:center; justify-content:space-between; }
    header h1 { font-size:18px; margin:0; }
    a { color:var(--accent); text-decoration:none; }
    main { max-width:1000px; margin:0 auto; padding:24px; }
    .card { background:var(--card); border:1px solid #232a33; border-radius:12px;
            padding:18px; margin-bottom:18px; }
    .row { display:flex; gap:14px; flex-wrap:wrap; }
    .pill { padding:2px 10px; border-radius:999px; font-size:12px; font-weight:600; }
    .Excellent { background:rgba(54,194,117,.18); color:var(--good); }
    .Good { background:rgba(224,162,59,.18); color:var(--warn); }
    .Poor { background:rgba(224,89,75,.18); color:var(--bad); }
    .score { font-weight:700; font-size:20px; }
    .muted { color:var(--muted); font-size:13px; }
    button { background:var(--accent); color:#06101f; border:0; padding:8px 14px;
             border-radius:8px; font-weight:600; cursor:pointer; }
    button.ghost { background:#232a33; color:var(--ink); }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:8px 10px; border-bottom:1px solid #232a33; font-size:14px; }
    pre { white-space:pre-wrap; background:#0c0f13; padding:14px; border-radius:8px;
          font-size:13px; line-height:1.5; }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Personal AI Job Application Agent</h1>
    <a href="/">Dashboard</a>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
